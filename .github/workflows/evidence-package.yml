name: Evidence Package (Post-Merge)

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  EVIDENCE_DIR: evidence/output

jobs:
  evidence-package:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create evidence directory
        run: mkdir -p ${{ env.EVIDENCE_DIR }}

      - name: Generate post-merge evidence summary
        run: |
          cat <<EOF > ${{ env.EVIDENCE_DIR }}/merge-summary.json
          {
            "event": "post_merge_evidence",
            "commit_sha": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "ref": "${{ github.ref }}",
            "run_id": "${{ github.run_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "evidence_sources": [
              "dependency-scan",
              "sast-bandit",
              "secret-scan",
              "container-scan",
              "change-approval",
              "deployment-log"
            ],
            "pipeline_run": "ci-pipeline.yml",
            "notes": "Evidence collected from CI pipeline run associated with this merge"
          }
          EOF

      - name: Generate integrity manifest
        run: |
          cd ${{ env.EVIDENCE_DIR }}
          echo "# Evidence Manifest — $(date -u +%Y-%m-%dT%H:%M:%SZ)" > MANIFEST.sha256
          echo "# Commit: ${{ github.sha }}" >> MANIFEST.sha256
          echo "# Actor: ${{ github.actor }}" >> MANIFEST.sha256
          echo "" >> MANIFEST.sha256
          find . -name "*.json" -type f | sort | while read -r f; do
            sha256sum "$f" >> MANIFEST.sha256
          done

      - name: Upload evidence package
        uses: actions/upload-artifact@v4
        with:
          name: evidence-package-${{ github.sha }}
          path: ${{ env.EVIDENCE_DIR }}/
          retention-days: 90
