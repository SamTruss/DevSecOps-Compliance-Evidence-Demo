name: CI Pipeline with Evidence Collection

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  EVIDENCE_DIR: evidence/output

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety cyclonedx-bom

      - name: Create evidence output directory
        run: mkdir -p ${{ env.EVIDENCE_DIR }}

      # ── Stage 1: Dependency Scanning ──────────────────────────────
      - name: Run dependency vulnerability scan (Safety)
        continue-on-error: true
        run: |
          safety check --json --output ${{ env.EVIDENCE_DIR }}/dependency-scan.json || true

      - name: Generate SBOM (CycloneDX)
        run: |
          cyclonedx-py requirements \
            --input requirements.txt \
            --output ${{ env.EVIDENCE_DIR }}/sbom.json \
            --format json

      # ── Stage 2: SAST (Static Analysis) ──────────────────────────
      - name: Run SAST scan (Bandit)
        continue-on-error: true
        run: |
          bandit -r app/ \
            -f json \
            -o ${{ env.EVIDENCE_DIR }}/sast-bandit.json \
            --configfile .bandit.yml || true

      # ── Stage 3: Secret Detection ────────────────────────────────
      - name: Run secret detection (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITLEAKS_ENABLE_COMMENTS: false
        with:
          args: >-
            detect
            --source .
            --report-format json
            --report-path ${{ env.EVIDENCE_DIR }}/secret-scan.json
            --config .gitleaks.toml

      # ── Stage 4: Container Image Scan ────────────────────────────
      - name: Build Docker image
        run: docker build -t devsecops-demo:${{ github.sha }} -f docker/Dockerfile .

      - name: Run container scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-demo:${{ github.sha }}
          format: json
          output: ${{ env.EVIDENCE_DIR }}/container-scan.json
          severity: CRITICAL,HIGH,MEDIUM

      # ── Stage 5: Change Approval Evidence ────────────────────────
      - name: Capture change approval metadata
        if: github.event_name == 'pull_request'
        run: |
          cat <<EOF > ${{ env.EVIDENCE_DIR }}/change-approval.json
          {
            "pr_number": ${{ github.event.pull_request.number }},
            "pr_title": "${{ github.event.pull_request.title }}",
            "pr_url": "${{ github.event.pull_request.html_url }}",
            "author": "${{ github.event.pull_request.user.login }}",
            "merged_by": "${{ github.event.pull_request.merged_by.login || 'pending' }}",
            "approvals_required": 1,
            "base_branch": "${{ github.event.pull_request.base.ref }}",
            "head_sha": "${{ github.sha }}",
            "created_at": "${{ github.event.pull_request.created_at }}",
            "captured_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      # ── Stage 6: Deployment Audit Trail ──────────────────────────
      - name: Generate deployment audit log
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cat <<EOF > ${{ env.EVIDENCE_DIR }}/deployment-log.json
          {
            "event": "deployment",
            "environment": "production",
            "actor": "${{ github.actor }}",
            "commit_sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "repository": "${{ github.repository }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "status": "success"
          }
          EOF

      # ── Stage 7: Evidence Packaging ──────────────────────────────
      - name: Generate evidence manifest (SHA-256)
        run: bash scripts/package-evidence.sh

      - name: Upload evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence-${{ github.run_number }}
          path: ${{ env.EVIDENCE_DIR }}/
          retention-days: 90
